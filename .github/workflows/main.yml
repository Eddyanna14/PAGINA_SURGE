name: Deploy to Surge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Surge
        run: npm install -g surge

      - name: Deploy a Surge
        run: surge ./ --domain tu-nombre.surge.sh
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}